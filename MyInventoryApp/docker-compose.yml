version: '3.8'
services:
  api:
    build: .
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=myinventorydb;Username=myuser;Password=mypassword
    depends_on:
      db:
        condition: service_started
    networks:
      - myinventory-network  # Agregar esto
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: myinventorydb
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - myinventory-network  # Agregar esto
  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrations
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=myinventorydb;Username=myuser;Password=mypassword

volumes:
  db-data:

networks:
  myinventory-network:  # Definir la red
    driver: bridge